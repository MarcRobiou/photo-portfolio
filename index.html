<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marc Photography</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="hero-shell">
    <section class="hero-banner">
      <p>made it for photographers</p>
    </section>

    <section class="showcase-card">
      <nav class="topbar">
        <a class="brand-mark" href="#" aria-label="Home">
          <span></span>
        </a>

        <div class="menu-links">
          <a href="#">Awards</a>
          <a href="#">Shots</a>
          <a href="#">Blog</a>
          <a href="#">Who we are</a>
          <a href="#">Find us</a>
        </div>

        <a class="contact-link" href="tel:+18297637272">+1 829 763 7272</a>
      </nav>

      <div class="showcase-grid">
        <div class="showcase-copy">
          <p class="eyebrow">We are experienced</p>
          <h1>Photographers</h1>
          <span class="scroll-indicator" aria-hidden="true"></span>
        </div>

        <div class="photo-mosaic">
          <figure class="photo photo-a">
            <img src="assets/images/photo7.jpg" alt="Portrait in a yellow dress">
          </figure>
          <figure class="photo photo-b">
            <img src="assets/images/photo8.jpg" alt="Fashion portrait with red tones">
          </figure>
          <figure class="photo photo-c">
            <img src="assets/images/photo5.jpg" alt="Portrait in a red dress outdoors">
          </figure>
          <figure class="photo photo-d">
            <img src="assets/images/photo4.jpg" alt="Portrait in nature">
          </figure>
          <figure class="photo photo-e">
            <img src="assets/images/photo2.jpg" alt="Editorial portrait on a couch">
          </figure>
          <figure class="photo photo-f">
            <img src="assets/images/photo3.jpg" alt="Fashion portrait in motion">
          </figure>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
